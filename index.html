<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="masters.svg" type="image/svg+xml">
<title>The Masters Draft</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #006747;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  h1, h2 { font-family: Georgia, 'Times New Roman', serif; }
  h1 {
    color: #D4AF37;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }
  .subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    display: block;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    text-decoration: none;
    color: #fff;
    min-width: 240px;
    transition: border-color 0.3s, background 0.3s, transform 0.2s;
  }
  .card:hover {
    border-color: #D4AF37;
    background: rgba(212,175,55,0.15);
    transform: translateY(-4px);
  }
  .card h2 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .card .year {
    color: #D4AF37;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .footer {
    margin-top: 64px;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>The Masters Draft</h1>
  <div class="subtitle">Augusta National Golf Club</div>
  <div class="cards">
    <a class="card" href="family/2026/">
      <h2>Family Draft</h2>
      <div class="year">2026</div>
    </a>
    <a class="card" href="friends/2026/">
      <h2>Friends Draft</h2>
      <div class="year">2026</div>
    </a>
  </div>
  <div class="footer">Scores update every 5 minutes during tournament play</div>
</body>
</html>
